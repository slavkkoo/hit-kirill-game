<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎾 Попади в Кирилла!</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rubik', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 10px;
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 900 / 600;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow:
                0 0 0 4px rgba(255,215,0,0.8),
                0 0 40px rgba(255,215,0,0.3),
                0 20px 60px rgba(0,0,0,0.5);
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        .instructions {
            color: rgba(255,255,255,0.7);
            margin-top: 20px;
            text-align: center;
            font-size: clamp(0.8em, 2.5vw, 1em);
            padding: 0 15px;
        }

        .instructions span {
            color: #FFD700;
            font-weight: bold;
        }

        .photo-upload {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 100;
        }

        .photo-upload label {
            display: inline-block;
            padding: 10px 18px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
            transition: all 0.3s ease;
        }

        .photo-upload label:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,107,107,0.5);
        }

        .photo-upload input {
            display: none;
        }

        .photo-loaded {
            background: linear-gradient(135deg, #4CAF50, #8BC34A) !important;
            box-shadow: 0 4px 15px rgba(76,175,80,0.4) !important;
        }

        /* Мобильные стили */
        @media (max-width: 600px) {
            body { padding: 5px; }
            .canvas-container { border-radius: 12px; }
            .instructions { margin-top: 10px; font-size: 0.85em; }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .canvas-container { max-height: 90vh; width: auto; }
            .instructions { display: none; }
        }
    </style>
</head>
<body>
    <div class="photo-upload">
        <label id="uploadLabel" for="photoInput">📷 Загрузить фото Кирилла</label>
        <input type="file" id="photoInput" accept="image/*">
    </div>

    <div class="game-wrapper">
        <div class="canvas-container">
            <canvas id="gameCanvas" width="900" height="600"></canvas>
        </div>
    </div>
    <div class="instructions">
        <span>Целься</span> → <span>Зажми</span> для силы → <span>Отпусти</span> для удара! | 📱 Тапни и удерживай
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Фото Кирилла
        let kirillPhoto = null;
        let photoLoaded = false;

        // Загрузка фото
        document.getElementById('photoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        kirillPhoto = img;
                        photoLoaded = true;
                        document.getElementById('uploadLabel').textContent = '✅ Фото загружено!';
                        document.getElementById('uploadLabel').classList.add('photo-loaded');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Размеры
        const W = 900, H = 600;

        // Состояние игры
        let score = 0, hits = 0, combo = 0, maxCombo = 0;
        let balls = [], particles = [], floatingTexts = [];
        let isCharging = false, power = 0;
        let mouseX = W / 2, mouseY = H / 2;
        let screenShake = 0, shakeX = 0, shakeY = 0;
        let gameTime = 0;

        // Звуки (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, type, duration, volume = 0.3) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playHitSound(isHeadshot) {
            if (isHeadshot) {
                playSound(880, 'square', 0.1, 0.2);
                playSound(1100, 'square', 0.15, 0.2);
                setTimeout(() => playSound(1320, 'square', 0.2, 0.15), 50);
            } else {
                playSound(440, 'sine', 0.1, 0.2);
                playSound(550, 'sine', 0.08, 0.15);
            }
        }

        function playThrowSound() {
            playSound(200 + power * 300, 'sawtooth', 0.1, 0.1);
        }

        // Кирилл
        const kirill = {
            x: 680, y: 320,
            width: 100, height: 180,
            isHit: false, hitTimer: 0,
            bobOffset: 0
        };

        // Игрок
        const player = { x: 140, y: 480 };

        // Система частиц
        function createParticles(x, y, color, count, speed, size) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                const vel = speed * (0.5 + Math.random() * 0.5);
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * vel,
                    vy: Math.sin(angle) * vel,
                    life: 1,
                    decay: 0.02 + Math.random() * 0.02,
                    size: size * (0.5 + Math.random() * 0.5),
                    color,
                    gravity: 0.1
                });
            }
        }

        function createStars(x, y, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x + (Math.random() - 0.5) * 60,
                    y: y + (Math.random() - 0.5) * 60,
                    vx: (Math.random() - 0.5) * 2,
                    vy: -2 - Math.random() * 3,
                    life: 1,
                    decay: 0.015,
                    size: 8 + Math.random() * 8,
                    type: 'star',
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.2
                });
            }
        }

        // Floating text
        function createFloatingText(x, y, text, color, size) {
            floatingTexts.push({
                x, y, text, color, size,
                life: 1,
                vy: -3
            });
        }

        // Координаты
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = W / rect.width, scaleY = H / rect.height;
            let clientX, clientY;
            if (e.touches?.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else if (e.changedTouches?.length > 0) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        // Рисуем фон
        function drawBackground() {
            // Небо
            const sky = ctx.createLinearGradient(0, 0, 0, 250);
            sky.addColorStop(0, '#1a237e');
            sky.addColorStop(1, '#4fc3f7');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, W, 250);

            // Облака
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            const cloudOffset = (gameTime * 0.5) % 200;
            [[-50, 60], [200, 40], [500, 70], [750, 50]].forEach(([cx, cy]) => {
                const x = (cx + cloudOffset) % (W + 100) - 50;
                ctx.beginPath();
                ctx.arc(x, cy, 30, 0, Math.PI * 2);
                ctx.arc(x + 25, cy - 10, 25, 0, Math.PI * 2);
                ctx.arc(x + 50, cy, 28, 0, Math.PI * 2);
                ctx.fill();
            });

            // Трибуны
            const stands = ctx.createLinearGradient(0, 180, 0, 250);
            stands.addColorStop(0, '#1B5E20');
            stands.addColorStop(1, '#2E7D32');
            ctx.fillStyle = stands;
            ctx.fillRect(0, 180, W, 70);

            // Люди на трибунах
            for (let i = 0; i < 30; i++) {
                const px = 30 + i * 28;
                const py = 200 + Math.sin(i + gameTime * 0.1) * 3;
                ctx.fillStyle = ['#FF5722', '#E91E63', '#9C27B0', '#3F51B5', '#00BCD4'][i % 5];
                ctx.beginPath();
                ctx.arc(px, py, 8, 0, Math.PI * 2);
                ctx.fill();
            }

            // Корт (US Open Blue)
            ctx.fillStyle = '#0D47A1';
            ctx.fillRect(0, 250, W, 350);

            // Игровая зона
            const courtGrad = ctx.createLinearGradient(0, 250, 0, 580);
            courtGrad.addColorStop(0, '#1565C0');
            courtGrad.addColorStop(1, '#0D47A1');
            ctx.fillStyle = courtGrad;
            ctx.fillRect(60, 270, 680, 310);

            // Линии корта
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 5;
            ctx.strokeRect(60, 270, 680, 310);

            ctx.lineWidth = 3;
            // Горизонтальная центральная
            ctx.beginPath();
            ctx.moveTo(60, 425);
            ctx.lineTo(740, 425);
            ctx.stroke();

            // Вертикальная центральная
            ctx.beginPath();
            ctx.moveTo(400, 270);
            ctx.lineTo(400, 580);
            ctx.stroke();

            // Зоны подачи
            ctx.strokeRect(60, 320, 340, 210);
            ctx.strokeRect(400, 320, 340, 210);

            // Сетка
            ctx.fillStyle = '#263238';
            ctx.fillRect(395, 300, 10, 220);

            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(393, 295, 14, 10);

            // Паттерн сетки
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            for (let y = 310; y < 520; y += 15) {
                ctx.beginPath();
                ctx.moveTo(397, y);
                ctx.lineTo(403, y);
                ctx.stroke();
            }

            // Стена справа
            const wall = ctx.createLinearGradient(760, 0, 900, 0);
            wall.addColorStop(0, '#1565C0');
            wall.addColorStop(0.5, '#1976D2');
            wall.addColorStop(1, '#0D47A1');
            ctx.fillStyle = wall;
            ctx.fillRect(780, 180, 120, 420);

            // Разметка стены
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 4;
            ctx.strokeRect(790, 240, 100, 300);

            ctx.lineWidth = 2;
            for (let y = 290; y < 540; y += 50) {
                ctx.beginPath();
                ctx.moveTo(790, y);
                ctx.lineTo(890, y);
                ctx.stroke();
            }

            // Мишень на стене
            ctx.strokeStyle = 'rgba(255,0,0,0.3)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(840, 390, 40, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(840, 390, 20, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Рисуем Кирилла (с характерными чертами: очки, улыбка, каштановые волосы)
        function drawKirill() {
            const k = kirill;
            const bob = Math.sin(gameTime * 0.05) * 3;
            k.bobOffset = bob;

            ctx.save();
            if (k.isHit) {
                ctx.translate(k.x + k.width/2, k.y + k.height/2);
                ctx.rotate(Math.sin(k.hitTimer * 0.5) * 0.15);
                ctx.translate(-(k.x + k.width/2), -(k.y + k.height/2));
            }

            // Тень
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.beginPath();
            ctx.ellipse(k.x + 50, 575, 50, 14, 0, 0, Math.PI * 2);
            ctx.fill();

            const y = k.y + bob;

            // Ноги
            ctx.fillStyle = '#37474F';
            ctx.fillRect(k.x + 25, y + 145, 20, 38);
            ctx.fillRect(k.x + 55, y + 145, 20, 38);

            // Кроссовки
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.roundRect(k.x + 20, y + 175, 28, 14, 4);
            ctx.roundRect(k.x + 52, y + 175, 28, 14, 4);
            ctx.fill();

            // Рубашка в полоску (как на фото)
            ctx.fillStyle = k.isHit ? '#EF5350' : '#78909C';
            ctx.beginPath();
            ctx.roundRect(k.x + 12, y + 62, 76, 88, 12);
            ctx.fill();

            // Полоски на рубашке
            if (!k.isHit) {
                ctx.strokeStyle = '#546E7A';
                ctx.lineWidth = 3;
                for (let i = 0; i < 8; i++) {
                    ctx.beginPath();
                    ctx.moveTo(k.x + 18, y + 72 + i * 10);
                    ctx.lineTo(k.x + 82, y + 72 + i * 10);
                    ctx.stroke();
                }
            }

            // Воротник
            ctx.fillStyle = k.isHit ? '#FFCDD2' : '#B0BEC5';
            ctx.beginPath();
            ctx.moveTo(k.x + 35, y + 62);
            ctx.lineTo(k.x + 50, y + 75);
            ctx.lineTo(k.x + 65, y + 62);
            ctx.closePath();
            ctx.fill();

            // Руки
            ctx.fillStyle = k.isHit ? '#FFAB91' : '#E8B89D';
            ctx.fillRect(k.x + 2, y + 68, 18, 55);
            ctx.fillRect(k.x + 80, y + 68, 18, 55);

            // Шея
            ctx.fillStyle = k.isHit ? '#FFAB91' : '#E8B89D';
            ctx.fillRect(k.x + 38, y + 50, 24, 18);

            // Голова - если есть фото, используем его
            if (photoLoaded && kirillPhoto && !k.isHit) {
                // Круглая маска для фото
                ctx.save();
                ctx.beginPath();
                ctx.arc(k.x + 50, y + 38, 42, 0, Math.PI * 2);
                ctx.clip();

                // Рисуем фото
                const imgSize = 90;
                ctx.drawImage(kirillPhoto, k.x + 50 - imgSize/2, y + 38 - imgSize/2 - 5, imgSize, imgSize * 1.1);

                ctx.restore();

                // Рамка вокруг фото
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(k.x + 50, y + 38, 43, 0, Math.PI * 2);
                ctx.stroke();

            } else {
                // Голова (загорелая кожа) - fallback если нет фото
                const headGrad = ctx.createRadialGradient(k.x + 45, y + 30, 5, k.x + 50, y + 38, 42);
                headGrad.addColorStop(0, k.isHit ? '#FFCCBC' : '#F5D0B8');
                headGrad.addColorStop(1, k.isHit ? '#FFAB91' : '#E8B89D');
                ctx.fillStyle = headGrad;
                ctx.beginPath();
                ctx.ellipse(k.x + 50, y + 38, 42, 40, 0, 0, Math.PI * 2);
                ctx.fill();

                // Уши
                ctx.fillStyle = k.isHit ? '#FFAB91' : '#E8B89D';
                ctx.beginPath();
                ctx.ellipse(k.x + 8, y + 40, 8, 12, -0.2, 0, Math.PI * 2);
                ctx.ellipse(k.x + 92, y + 40, 8, 12, 0.2, 0, Math.PI * 2);
                ctx.fill();

                // Волосы (каштановые, пышные как на фото)
                const hairGrad = ctx.createLinearGradient(k.x + 10, y - 15, k.x + 90, y + 30);
                hairGrad.addColorStop(0, '#6D4C41');
                hairGrad.addColorStop(0.5, '#8D6E63');
                hairGrad.addColorStop(1, '#5D4037');
                ctx.fillStyle = hairGrad;

                // Основная масса волос
                ctx.beginPath();
                ctx.moveTo(k.x + 8, y + 35);
                ctx.quadraticCurveTo(k.x + 5, y + 10, k.x + 25, y - 5);
                ctx.quadraticCurveTo(k.x + 50, y - 15, k.x + 75, y - 5);
                ctx.quadraticCurveTo(k.x + 95, y + 10, k.x + 92, y + 35);
                ctx.quadraticCurveTo(k.x + 85, y + 15, k.x + 50, y + 10);
                ctx.quadraticCurveTo(k.x + 15, y + 15, k.x + 8, y + 35);
                ctx.fill();

                // Пряди волос (небрежные, как на фото)
                ctx.beginPath();
                ctx.moveTo(k.x + 20, y + 5);
                ctx.quadraticCurveTo(k.x + 30, y + 25, k.x + 35, y + 18);
                ctx.quadraticCurveTo(k.x + 40, y + 5, k.x + 20, y + 5);
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(k.x + 55, y + 2);
                ctx.quadraticCurveTo(k.x + 65, y + 22, k.x + 70, y + 15);
                ctx.quadraticCurveTo(k.x + 75, y + 0, k.x + 55, y + 2);
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(k.x + 75, y + 8);
                ctx.quadraticCurveTo(k.x + 85, y + 25, k.x + 88, y + 20);
                ctx.quadraticCurveTo(k.x + 90, y + 5, k.x + 75, y + 8);
                ctx.fill();

                // Брови (выразительные)
                ctx.fillStyle = '#5D4037';
                ctx.beginPath();
                ctx.ellipse(k.x + 32, y + 22, 12, 4, -0.15, 0, Math.PI * 2);
                ctx.ellipse(k.x + 68, y + 22, 12, 4, 0.15, 0, Math.PI * 2);
                ctx.fill();

                if (k.isHit) {
                    // Звёзды при попадании
                    ctx.strokeStyle = '#FFD700';
                    ctx.lineWidth = 3;
                    [-18, 18].forEach(offset => {
                        ctx.save();
                        ctx.translate(k.x + 50 + offset, y + 38);
                        ctx.rotate(gameTime * 0.2);
                        ctx.beginPath();
                        for (let i = 0; i < 5; i++) {
                            const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                            ctx.lineTo(Math.cos(angle) * 12, Math.sin(angle) * 12);
                            const angle2 = angle + (2 * Math.PI) / 10;
                            ctx.lineTo(Math.cos(angle2) * 5, Math.sin(angle2) * 5);
                        }
                        ctx.closePath();
                        ctx.stroke();
                        ctx.restore();
                    });

                    // Рот "ОЙ!"
                    ctx.fillStyle = '#D32F2F';
                    ctx.beginPath();
                    ctx.ellipse(k.x + 50, y + 62, 15, 12, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.ellipse(k.x + 50, y + 62, 12, 9, 0, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Солнечные очки (как на фото - круглые, коричневые)
                    // Оправа
                    ctx.strokeStyle = '#4E342E';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(k.x + 18, y + 35);
                    ctx.lineTo(k.x + 82, y + 35);
                    ctx.stroke();

                    // Левая линза
                    const lensGradL = ctx.createLinearGradient(k.x + 20, y + 28, k.x + 45, y + 50);
                    lensGradL.addColorStop(0, '#8D6E63');
                    lensGradL.addColorStop(0.5, '#6D4C41');
                    lensGradL.addColorStop(1, '#4E342E');
                    ctx.fillStyle = lensGradL;
                    ctx.strokeStyle = '#3E2723';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.ellipse(k.x + 32, y + 38, 16, 14, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    // Блик на левой линзе
                    ctx.fillStyle = 'rgba(255,255,255,0.25)';
                    ctx.beginPath();
                    ctx.ellipse(k.x + 28, y + 34, 6, 4, -0.5, 0, Math.PI * 2);
                    ctx.fill();

                    // Правая линза
                    const lensGradR = ctx.createLinearGradient(k.x + 55, y + 28, k.x + 80, y + 50);
                    lensGradR.addColorStop(0, '#8D6E63');
                    lensGradR.addColorStop(0.5, '#6D4C41');
                    lensGradR.addColorStop(1, '#4E342E');
                    ctx.fillStyle = lensGradR;
                    ctx.beginPath();
                    ctx.ellipse(k.x + 68, y + 38, 16, 14, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    // Блик на правой линзе
                    ctx.fillStyle = 'rgba(255,255,255,0.25)';
                    ctx.beginPath();
                    ctx.ellipse(k.x + 64, y + 34, 6, 4, -0.5, 0, Math.PI * 2);
                    ctx.fill();

                    // Перемычка очков
                    ctx.strokeStyle = '#4E342E';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(k.x + 48, y + 38);
                    ctx.lineTo(k.x + 52, y + 38);
                    ctx.stroke();

                    // Дужки очков
                    ctx.beginPath();
                    ctx.moveTo(k.x + 16, y + 35);
                    ctx.lineTo(k.x + 8, y + 38);
                    ctx.moveTo(k.x + 84, y + 35);
                    ctx.lineTo(k.x + 92, y + 38);
                    ctx.stroke();

                    // Широкая улыбка с зубами (как на фото!)
                    // Губы
                    ctx.fillStyle = '#E57373';
                    ctx.beginPath();
                    ctx.moveTo(k.x + 28, y + 58);
                    ctx.quadraticCurveTo(k.x + 50, y + 52, k.x + 72, y + 58);
                    ctx.quadraticCurveTo(k.x + 50, y + 78, k.x + 28, y + 58);
                    ctx.fill();

                    // Внутренняя часть рта
                    ctx.fillStyle = '#C62828';
                    ctx.beginPath();
                    ctx.moveTo(k.x + 32, y + 58);
                    ctx.quadraticCurveTo(k.x + 50, y + 54, k.x + 68, y + 58);
                    ctx.quadraticCurveTo(k.x + 50, y + 72, k.x + 32, y + 58);
                    ctx.fill();

                    // Зубы (верхние)
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.moveTo(k.x + 34, y + 58);
                    ctx.lineTo(k.x + 66, y + 58);
                    ctx.lineTo(k.x + 64, y + 65);
                    ctx.quadraticCurveTo(k.x + 50, y + 67, k.x + 36, y + 65);
                    ctx.closePath();
                    ctx.fill();

                    // Линии между зубами
                    ctx.strokeStyle = '#E0E0E0';
                    ctx.lineWidth = 1;
                    for (let i = 38; i < 65; i += 5) {
                        ctx.beginPath();
                        ctx.moveTo(k.x + i, y + 58);
                        ctx.lineTo(k.x + i, y + 64);
                        ctx.stroke();
                    }

                    // Нос (маленький)
                    ctx.fillStyle = '#D7A98C';
                    ctx.beginPath();
                    ctx.moveTo(k.x + 50, y + 42);
                    ctx.lineTo(k.x + 46, y + 52);
                    ctx.quadraticCurveTo(k.x + 50, y + 54, k.x + 54, y + 52);
                    ctx.closePath();
                    ctx.fill();

                    // Ноздри
                    ctx.fillStyle = '#BF8A70';
                    ctx.beginPath();
                    ctx.ellipse(k.x + 47, y + 52, 2, 1.5, 0, 0, Math.PI * 2);
                    ctx.ellipse(k.x + 53, y + 52, 2, 1.5, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // Щёки (румянец от смеха)
                    ctx.fillStyle = 'rgba(255,138,128,0.3)';
                    ctx.beginPath();
                    ctx.ellipse(k.x + 22, y + 50, 10, 6, 0, 0, Math.PI * 2);
                    ctx.ellipse(k.x + 78, y + 50, 10, 6, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // Морщинки от смеха
                    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(k.x + 18, y + 42, 8, -0.5, 0.8);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(k.x + 82, y + 42, 8, Math.PI - 0.8, Math.PI + 0.5);
                    ctx.stroke();
                }
            }

            // Эффект при попадании с фото
            if (k.isHit && photoLoaded) {
                // Красная вспышка поверх фото
                ctx.fillStyle = `rgba(255, 0, 0, ${0.3 + Math.sin(k.hitTimer * 0.5) * 0.2})`;
                ctx.beginPath();
                ctx.arc(k.x + 50, y + 38, 44, 0, Math.PI * 2);
                ctx.fill();

                // Звёзды вокруг головы
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 3;
                for (let i = 0; i < 3; i++) {
                    ctx.save();
                    ctx.translate(k.x + 50, y + 38);
                    ctx.rotate(gameTime * 0.15 + i * (Math.PI * 2 / 3));
                    ctx.translate(55, 0);
                    ctx.beginPath();
                    for (let j = 0; j < 5; j++) {
                        const angle = (j * 4 * Math.PI) / 5 - Math.PI / 2;
                        ctx.lineTo(Math.cos(angle) * 10, Math.sin(angle) * 10);
                        const angle2 = angle + (2 * Math.PI) / 10;
                        ctx.lineTo(Math.cos(angle2) * 4, Math.sin(angle2) * 4);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                }
            }

            ctx.restore();

            // Имя с эффектом
            ctx.save();
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 6;
            ctx.shadowOffsetY = 2;
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 24px "Russo One", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('КИРИЛЛ', k.x + 50, k.y - 20);
            ctx.restore();

            // Обновление анимации попадания
            if (k.isHit) {
                k.hitTimer--;
                if (k.hitTimer <= 0) k.isHit = false;
            }
        }

        // Рисуем игрока
        function drawPlayer() {
            const p = player;
            const bob = Math.sin(gameTime * 0.08) * 2;

            // Тень
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(p.x, 575, 35, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            const y = p.y + bob;

            // Ноги
            ctx.fillStyle = '#1A237E';
            ctx.fillRect(p.x - 18, y + 30, 16, 35);
            ctx.fillRect(p.x + 2, y + 30, 16, 35);

            // Кроссовки
            ctx.fillStyle = '#F44336';
            ctx.fillRect(p.x - 20, y + 60, 20, 10);
            ctx.fillRect(p.x, y + 60, 20, 10);

            // Тело
            ctx.fillStyle = '#F44336';
            ctx.beginPath();
            ctx.roundRect(p.x - 22, y - 45, 44, 75, 8);
            ctx.fill();

            // Номер на футболке
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 28px "Russo One"';
            ctx.textAlign = 'center';
            ctx.fillText('1', p.x, y);

            // Голова
            ctx.fillStyle = '#FFCCBC';
            ctx.beginPath();
            ctx.arc(p.x, y - 65, 25, 0, Math.PI * 2);
            ctx.fill();

            // Волосы
            ctx.fillStyle = '#3E2723';
            ctx.beginPath();
            ctx.arc(p.x, y - 75, 25, Math.PI, 0);
            ctx.fill();

            // Повязка
            ctx.fillStyle = '#F44336';
            ctx.fillRect(p.x - 25, y - 78, 50, 8);

            // Рука с ракеткой
            const angle = Math.atan2(mouseY - (y - 30), mouseX - (p.x + 30));

            ctx.save();
            ctx.translate(p.x + 22, y - 30);
            ctx.rotate(angle);

            // Рука
            ctx.fillStyle = '#FFCCBC';
            ctx.fillRect(0, -6, 45, 12);

            // Ручка ракетки
            ctx.fillStyle = '#4E342E';
            ctx.fillRect(40, -4, 30, 8);

            // Обод ракетки
            ctx.fillStyle = '#F44336';
            ctx.strokeStyle = '#B71C1C';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.ellipse(85, 0, 28, 22, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Струны
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.lineWidth = 1;
            for (let i = -18; i <= 18; i += 6) {
                ctx.beginPath();
                ctx.moveTo(65, i);
                ctx.lineTo(105, i);
                ctx.stroke();
            }
            for (let i = 65; i <= 105; i += 6) {
                ctx.beginPath();
                ctx.moveTo(i, -18);
                ctx.lineTo(i, 18);
                ctx.stroke();
            }

            ctx.restore();
        }

        // Прицел
        function drawAim() {
            const pulse = Math.sin(gameTime * 0.15) * 0.3 + 1;

            // Линия траектории
            ctx.strokeStyle = `rgba(255, 215, 0, ${0.3 + power * 0.4})`;
            ctx.lineWidth = 2 + power * 2;
            ctx.setLineDash([12, 8]);
            ctx.lineDashOffset = -gameTime * 2;
            ctx.beginPath();
            ctx.moveTo(player.x + 70, player.y - 30);
            ctx.lineTo(mouseX, mouseY);
            ctx.stroke();
            ctx.setLineDash([]);

            // Внешний круг
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 20 * pulse, 0, Math.PI * 2);
            ctx.stroke();

            // Внутренний круг
            ctx.strokeStyle = '#FF5722';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 8, 0, Math.PI * 2);
            ctx.stroke();

            // Перекрестие
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 2;
            const len = 12 * pulse;
            ctx.beginPath();
            ctx.moveTo(mouseX - 25, mouseY);
            ctx.lineTo(mouseX - len, mouseY);
            ctx.moveTo(mouseX + 25, mouseY);
            ctx.lineTo(mouseX + len, mouseY);
            ctx.moveTo(mouseX, mouseY - 25);
            ctx.lineTo(mouseX, mouseY - len);
            ctx.moveTo(mouseX, mouseY + 25);
            ctx.lineTo(mouseX, mouseY + len);
            ctx.stroke();
        }

        // Теннисный мяч с trail
        function drawBall(ball) {
            // Trail
            ctx.fillStyle = 'rgba(200, 255, 0, 0.15)';
            ball.trail.forEach((pos, i) => {
                const alpha = i / ball.trail.length;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, ball.radius * alpha * 0.8, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.save();
            ctx.translate(ball.x, ball.y);
            ctx.rotate(ball.rotation);

            // Тень
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(4, 4, ball.radius, ball.radius * 0.7, 0.3, 0, Math.PI * 2);
            ctx.fill();

            // Мяч
            const ballGrad = ctx.createRadialGradient(-3, -3, 0, 0, 0, ball.radius);
            ballGrad.addColorStop(0, '#E8FF5A');
            ballGrad.addColorStop(0.7, '#C6FF00');
            ballGrad.addColorStop(1, '#9ACD32');
            ctx.fillStyle = ballGrad;
            ctx.beginPath();
            ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            // Линия на мяче
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, ball.radius * 0.6, -0.6, 0.6);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, ball.radius * 0.6, Math.PI - 0.6, Math.PI + 0.6);
            ctx.stroke();

            ctx.restore();
        }

        // HUD внутри canvas
        function drawHUD() {
            // Полупрозрачная панель сверху
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath();
            ctx.roundRect(10, 10, 280, 70, 15);
            ctx.fill();

            // Заголовок
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 24px "Russo One"';
            ctx.textAlign = 'left';
            ctx.fillText('🎾 ПОПАДИ В КИРИЛЛА', 20, 38);

            // Счёт
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '18px "Rubik"';
            ctx.fillText(`Очки: ${score}  |  Попадания: ${hits}`, 20, 62);

            // Комбо (если есть)
            if (combo > 1) {
                const comboScale = 1 + Math.sin(gameTime * 0.3) * 0.1;
                ctx.save();
                ctx.translate(W - 100, 50);
                ctx.scale(comboScale, comboScale);

                ctx.fillStyle = 'rgba(255,87,34,0.8)';
                ctx.beginPath();
                ctx.roundRect(-60, -30, 120, 60, 15);
                ctx.fill();

                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 28px "Russo One"';
                ctx.textAlign = 'center';
                ctx.fillText(`x${combo}`, 0, 8);
                ctx.font = '12px "Rubik"';
                ctx.fillText('COMBO', 0, 24);
                ctx.restore();
            }

            // Шкала силы
            if (isCharging) {
                const barWidth = 200;
                const barHeight = 20;
                const barX = (W - barWidth) / 2;
                const barY = H - 50;

                // Фон
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.beginPath();
                ctx.roundRect(barX - 10, barY - 10, barWidth + 20, barHeight + 20, 10);
                ctx.fill();

                // Заполнение
                const gradient = ctx.createLinearGradient(barX, 0, barX + barWidth, 0);
                gradient.addColorStop(0, '#4CAF50');
                gradient.addColorStop(0.5, '#FFEB3B');
                gradient.addColorStop(1, '#F44336');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(barX, barY, barWidth * power, barHeight, 5);
                ctx.fill();

                // Рамка
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(barX, barY, barWidth, barHeight, 5);
                ctx.stroke();

                // Текст
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 14px "Rubik"';
                ctx.textAlign = 'center';
                ctx.fillText('СИЛА УДАРА', W / 2, barY - 15);
            }
        }

        // Частицы
        function updateAndDrawParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity || 0;
                p.life -= p.decay;

                if (p.life <= 0) return false;

                ctx.globalAlpha = p.life;

                if (p.type === 'star') {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    p.rotation += p.rotationSpeed;

                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                        const r = i === 0 ? p.size : p.size;
                        ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                        const angle2 = angle + (2 * Math.PI) / 10;
                        ctx.lineTo(Math.cos(angle2) * r * 0.4, Math.sin(angle2) * r * 0.4);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                } else {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.globalAlpha = 1;
                return true;
            });
        }

        // Floating texts
        function updateAndDrawFloatingTexts() {
            floatingTexts = floatingTexts.filter(t => {
                t.y += t.vy;
                t.life -= 0.02;

                if (t.life <= 0) return false;

                ctx.globalAlpha = t.life;
                ctx.fillStyle = t.color;
                ctx.font = `bold ${t.size}px "Russo One"`;
                ctx.textAlign = 'center';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 4;
                ctx.fillText(t.text, t.x, t.y);
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;

                return true;
            });
        }

        // Проверка попадания
        function checkHit(ball) {
            const k = kirill;
            const by = k.y + k.bobOffset;

            if (ball.x > k.x && ball.x < k.x + k.width &&
                ball.y > by && ball.y < by + k.height) {

                let points = 10;
                let text = '+10';
                let isHeadshot = false;

                if (ball.y < by + 75) {
                    points = 50;
                    text = 'HEADSHOT! +50';
                    isHeadshot = true;
                    screenShake = 15;
                    createStars(ball.x, ball.y, 8);
                }

                // Комбо
                combo++;
                if (combo > maxCombo) maxCombo = combo;

                const comboMultiplier = Math.min(combo, 5);
                points *= comboMultiplier;

                if (combo > 1) {
                    text += ` x${comboMultiplier}`;
                }

                score += points;
                hits++;

                // Эффекты
                playHitSound(isHeadshot);
                createParticles(ball.x, ball.y, isHeadshot ? '#FFD700' : '#FF5722', isHeadshot ? 25 : 15, isHeadshot ? 12 : 8, isHeadshot ? 8 : 5);
                createFloatingText(ball.x, ball.y - 30, text, isHeadshot ? '#FFD700' : '#FFFFFF', isHeadshot ? 36 : 28);

                kirill.isHit = true;
                kirill.hitTimer = 25;

                if (navigator.vibrate) {
                    navigator.vibrate(isHeadshot ? [50, 30, 100] : 30);
                }

                return true;
            }
            return false;
        }

        // Обновление мячей
        function updateBalls() {
            balls = balls.filter(ball => {
                // Trail
                ball.trail.push({ x: ball.x, y: ball.y });
                if (ball.trail.length > 8) ball.trail.shift();

                ball.x += ball.vx;
                ball.y += ball.vy;
                ball.vy += 0.35;
                ball.rotation += ball.spin;

                if (checkHit(ball)) {
                    return false;
                }

                // Стена
                if (ball.x > 775) {
                    ball.x = 775;
                    ball.vx *= -0.75;
                    createParticles(ball.x, ball.y, '#4FC3F7', 5, 4, 3);
                }

                // Сетка
                if (ball.x > 390 && ball.x < 410 && ball.y > 295 && ball.y < 520) {
                    ball.x = ball.vx > 0 ? 390 : 410;
                    ball.vx *= -0.5;
                    combo = 0; // Сброс комбо при попадании в сетку
                }

                // Пол
                if (ball.y > 560) {
                    ball.y = 560;
                    ball.vy *= -0.65;
                    ball.vx *= 0.85;
                    combo = 0; // Сброс комбо при падении
                    createParticles(ball.x, ball.y, '#FFFFFF', 3, 3, 2);
                }

                return ball.x > -50 && ball.x < 950 && ball.y < 650;
            });
        }

        // Бросок
        function throwBall() {
            const angle = Math.atan2(mouseY - (player.y - 30), mouseX - (player.x + 70));
            const speed = 10 + power * 16;

            audioCtx.resume();
            playThrowSound();

            balls.push({
                x: player.x + 80,
                y: player.y - 35,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: 14,
                rotation: 0,
                spin: (Math.random() - 0.5) * 0.4,
                trail: []
            });
        }

        // Screen shake
        function updateScreenShake() {
            if (screenShake > 0) {
                shakeX = (Math.random() - 0.5) * screenShake;
                shakeY = (Math.random() - 0.5) * screenShake;
                screenShake *= 0.85;
                if (screenShake < 0.5) screenShake = 0;
            } else {
                shakeX = shakeY = 0;
            }
        }

        // Игровой цикл
        function gameLoop() {
            gameTime++;
            updateScreenShake();

            ctx.save();
            ctx.translate(shakeX, shakeY);

            drawBackground();
            drawKirill();
            drawPlayer();
            drawAim();
            balls.forEach(drawBall);
            updateAndDrawParticles();
            updateAndDrawFloatingTexts();
            updateBalls();
            drawHUD();

            ctx.restore();

            if (isCharging) {
                power = Math.min(power + 0.025, 1);
            }

            requestAnimationFrame(gameLoop);
        }

        // События
        canvas.addEventListener('mousemove', e => {
            const c = getCoords(e);
            mouseX = c.x; mouseY = c.y;
        });

        canvas.addEventListener('mousedown', e => {
            e.preventDefault();
            audioCtx.resume();
            isCharging = true;
            power = 0;
        });

        canvas.addEventListener('mouseup', e => {
            e.preventDefault();
            if (isCharging) {
                throwBall();
                isCharging = false;
                power = 0;
            }
        });

        canvas.addEventListener('mouseleave', () => {
            if (isCharging) throwBall();
            isCharging = false;
            power = 0;
        });

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            audioCtx.resume();
            const c = getCoords(e);
            mouseX = c.x; mouseY = c.y;
            isCharging = true;
            power = 0;
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const c = getCoords(e);
            mouseX = c.x; mouseY = c.y;
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            if (isCharging) {
                throwBall();
                isCharging = false;
                power = 0;
            }
        }, { passive: false });

        canvas.addEventListener('touchcancel', () => {
            isCharging = false;
            power = 0;
        });

        // Старт
        gameLoop();
    </script>
</body>
</html>
