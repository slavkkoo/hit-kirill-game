<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎾 Попади в Кирилла!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 10px;
        }

        h1 {
            color: #fff;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: clamp(1.5em, 5vw, 2.5em);
            text-align: center;
        }

        .game-info {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            color: #fff;
            font-size: clamp(0.9em, 3vw, 1.3em);
            flex-wrap: wrap;
            justify-content: center;
        }

        .score, .hits {
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
        }

        .canvas-container {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 900 / 550;
            position: relative;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            border: 4px solid #e94560;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
            cursor: crosshair;
            touch-action: none;
        }

        .instructions {
            color: #aaa;
            margin-top: 15px;
            text-align: center;
            font-size: clamp(0.85em, 2.5vw, 1.1em);
            padding: 0 15px;
            line-height: 1.6;
        }

        .instructions span {
            color: #e94560;
            font-weight: bold;
        }

        .hit-effect {
            position: fixed;
            font-size: clamp(1.5em, 5vw, 3em);
            pointer-events: none;
            animation: hitPop 0.8s ease-out forwards;
            z-index: 1000;
            white-space: nowrap;
        }

        @keyframes hitPop {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2) translateY(-50px); opacity: 0; }
        }

        .power-bar-container {
            width: min(200px, 60vw);
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        .power-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff88, #ffff00, #ff4444);
            transition: width 0.05s;
            border-radius: 10px;
        }

        .power-label {
            color: #fff;
            margin-top: 5px;
            font-size: clamp(0.75em, 2vw, 0.9em);
        }

        /* Мобильные стили */
        @media (max-width: 600px) {
            body {
                padding: 5px;
            }

            h1 {
                margin: 5px 0;
            }

            .game-info {
                gap: 10px;
                margin-bottom: 5px;
            }

            .score, .hits {
                padding: 6px 15px;
            }

            .canvas-container {
                border-radius: 10px;
            }

            #gameCanvas {
                border-width: 3px;
                border-radius: 10px;
            }

            .instructions {
                margin-top: 10px;
            }
        }

        /* Ландшафтная ориентация на мобильных */
        @media (max-height: 500px) and (orientation: landscape) {
            h1 {
                font-size: 1.2em;
                margin: 5px 0;
            }

            .game-info {
                font-size: 0.9em;
                margin-bottom: 5px;
            }

            .canvas-container {
                max-height: 70vh;
                width: auto;
                aspect-ratio: 900 / 550;
            }

            .power-bar-container {
                height: 15px;
                margin-top: 5px;
            }

            .instructions {
                display: none;
            }
        }
    </style>
</head>
<body>
    <h1>🎾 Попади в Кирилла!</h1>

    <div class="game-info">
        <div class="score">Очки: <span id="score">0</span></div>
        <div class="hits">Попадания: <span id="hits">0</span></div>
    </div>

    <div class="canvas-container">
        <canvas id="gameCanvas" width="900" height="550"></canvas>
    </div>

    <div class="power-bar-container">
        <div class="power-bar" id="powerBar"></div>
    </div>
    <div class="power-label">Удерживай для силы удара</div>

    <div class="instructions">
        <span>Целься</span> → <span>Зажми</span> для силы → <span>Отпусти</span> для удара!<br>
        📱 На мобильном: тапни и удерживай, затем отпусти
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const hitsEl = document.getElementById('hits');
        const powerBar = document.getElementById('powerBar');

        // Масштабирование для ретины и адаптивности
        const baseWidth = 900;
        const baseHeight = 550;

        let score = 0;
        let hits = 0;
        let balls = [];
        let isCharging = false;
        let power = 0;
        let mouseX = baseWidth / 2;
        let mouseY = baseHeight / 2;

        // Кирилл (стоит у стены на корте)
        const kirill = {
            x: 720,
            y: 340,
            width: 80,
            height: 160,
            isHit: false,
            hitTimer: 0,
            expression: 'normal'
        };

        // Игрок (ракетка) - стоит на своей стороне корта
        const player = {
            x: 120,
            y: 450
        };

        // Получить координаты относительно canvas
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = baseWidth / rect.width;
            const scaleY = baseHeight / rect.height;

            let clientX, clientY;

            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else if (e.changedTouches && e.changedTouches.length > 0) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        // Рисуем фон (теннисный корт)
        function drawBackground() {
            // Небо с градиентом
            const skyGradient = ctx.createLinearGradient(0, 0, 0, 200);
            skyGradient.addColorStop(0, '#87CEEB');
            skyGradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, baseWidth, 200);

            // Трибуны/забор на фоне
            ctx.fillStyle = '#2C5530';
            ctx.fillRect(0, 150, baseWidth, 80);

            // Основа корта (хард синий как US Open)
            ctx.fillStyle = '#1E4D8C';
            ctx.fillRect(0, 200, baseWidth, 350);

            // Внутренняя часть корта (светлее)
            ctx.fillStyle = '#2563A8';
            ctx.fillRect(50, 220, 750, 310);

            // Белые линии корта
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 4;

            // Внешняя граница
            ctx.strokeRect(50, 220, 750, 310);

            // Центральная линия подачи (горизонтальная)
            ctx.beginPath();
            ctx.moveTo(50, 375);
            ctx.lineTo(800, 375);
            ctx.stroke();

            // Вертикальная центральная линия
            ctx.beginPath();
            ctx.moveTo(425, 220);
            ctx.lineTo(425, 530);
            ctx.stroke();

            // Линии подачи
            ctx.lineWidth = 3;
            // Левая зона подачи
            ctx.strokeRect(50, 280, 375, 190);
            // Правая зона подачи
            ctx.strokeRect(425, 280, 375, 190);

            // Маленькая центральная метка
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(420, 375);
            ctx.lineTo(430, 375);
            ctx.stroke();

            // Сетка теннисная
            ctx.fillStyle = '#333';
            ctx.fillRect(420, 250, 10, 200);

            // Верхняя часть сетки (белая полоса)
            ctx.fillStyle = '#FFF';
            ctx.fillRect(418, 248, 14, 8);

            // Сетка - вертикальные линии
            ctx.strokeStyle = 'rgba(50,50,50,0.5)';
            ctx.lineWidth = 1;
            for (let y = 260; y < 450; y += 8) {
                ctx.beginPath();
                ctx.moveTo(423, y);
                ctx.lineTo(427, y);
                ctx.stroke();
            }

            // Стена справа (для отскока)
            const wallGradient = ctx.createLinearGradient(800, 0, 900, 0);
            wallGradient.addColorStop(0, '#1B4F72');
            wallGradient.addColorStop(1, '#154360');
            ctx.fillStyle = wallGradient;
            ctx.fillRect(820, 150, 80, 400);

            // Разметка на стене
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 3;
            ctx.strokeRect(825, 200, 70, 300);

            // Горизонтальные линии на стене
            ctx.lineWidth = 2;
            for (let y = 250; y < 500; y += 50) {
                ctx.beginPath();
                ctx.moveTo(825, y);
                ctx.lineTo(895, y);
                ctx.stroke();
            }

            // Тень от Кирилла на корте
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.beginPath();
            ctx.ellipse(kirill.x + 40, 520, 45, 15, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // Рисуем Кирилла
        function drawKirill() {
            const k = kirill;

            // Тело
            ctx.fillStyle = k.isHit ? '#ff6b6b' : '#4a90d9';
            ctx.fillRect(k.x + 15, k.y + 60, 50, 80);

            // Голова
            ctx.fillStyle = k.isHit ? '#ffaaaa' : '#ffd5b5';
            ctx.beginPath();
            ctx.arc(k.x + 40, k.y + 35, 35, 0, Math.PI * 2);
            ctx.fill();

            // Волосы
            ctx.fillStyle = '#4a3728';
            ctx.beginPath();
            ctx.arc(k.x + 40, k.y + 25, 35, Math.PI, 0);
            ctx.fill();

            // Глаза
            ctx.fillStyle = '#000';
            if (k.isHit) {
                // Крестики вместо глаз при попадании
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(k.x + 25, k.y + 28);
                ctx.lineTo(k.x + 35, k.y + 38);
                ctx.moveTo(k.x + 35, k.y + 28);
                ctx.lineTo(k.x + 25, k.y + 38);
                ctx.moveTo(k.x + 45, k.y + 28);
                ctx.lineTo(k.x + 55, k.y + 38);
                ctx.moveTo(k.x + 55, k.y + 28);
                ctx.lineTo(k.x + 45, k.y + 38);
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.arc(k.x + 30, k.y + 33, 5, 0, Math.PI * 2);
                ctx.arc(k.x + 50, k.y + 33, 5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Рот
            ctx.beginPath();
            if (k.isHit) {
                // Рот "ой!"
                ctx.arc(k.x + 40, k.y + 50, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();
            } else {
                // Улыбка
                ctx.arc(k.x + 40, k.y + 45, 12, 0.1 * Math.PI, 0.9 * Math.PI);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Ноги
            ctx.fillStyle = '#3a3a3a';
            ctx.fillRect(k.x + 18, k.y + 140, 18, 20);
            ctx.fillRect(k.x + 44, k.y + 140, 18, 20);

            // Руки
            ctx.fillStyle = k.isHit ? '#ffaaaa' : '#ffd5b5';
            ctx.fillRect(k.x + 5, k.y + 65, 15, 50);
            ctx.fillRect(k.x + 60, k.y + 65, 15, 50);

            // Имя
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('КИРИЛЛ', k.x + 40, k.y - 10);

            // Обновляем таймер попадания
            if (k.isHit) {
                k.hitTimer--;
                if (k.hitTimer <= 0) {
                    k.isHit = false;
                }
            }
        }

        // Рисуем прицел
        function drawAim() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            ctx.moveTo(player.x + 60, player.y - 30);
            ctx.lineTo(mouseX, mouseY);
            ctx.stroke();
            ctx.setLineDash([]);

            // Прицел
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 15, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(mouseX - 20, mouseY);
            ctx.lineTo(mouseX + 20, mouseY);
            ctx.moveTo(mouseX, mouseY - 20);
            ctx.lineTo(mouseX, mouseY + 20);
            ctx.stroke();
        }

        // Рисуем теннисный мяч
        function drawBall(ball) {
            ctx.save();
            ctx.translate(ball.x, ball.y);
            ctx.rotate(ball.rotation);

            // Тень мяча
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(3, 3, ball.radius, ball.radius * 0.8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Мяч
            ctx.fillStyle = '#ccff00';
            ctx.beginPath();
            ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            // Линии на мяче
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, ball.radius * 0.7, -0.5, 0.5);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, ball.radius * 0.7, Math.PI - 0.5, Math.PI + 0.5);
            ctx.stroke();

            ctx.restore();
        }

        // Рисуем игрока с ракеткой
        function drawPlayer() {
            // Тень игрока
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.beginPath();
            ctx.ellipse(player.x, 520, 30, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // Голова
            ctx.fillStyle = '#ffd5b5';
            ctx.beginPath();
            ctx.arc(player.x, player.y - 60, 22, 0, Math.PI * 2);
            ctx.fill();

            // Волосы
            ctx.fillStyle = '#4a3728';
            ctx.beginPath();
            ctx.arc(player.x, player.y - 68, 22, Math.PI, 0);
            ctx.fill();

            // Тело (спортивная форма)
            ctx.fillStyle = '#e94560';
            ctx.fillRect(player.x - 18, player.y - 38, 36, 45);

            // Шорты
            ctx.fillStyle = '#333';
            ctx.fillRect(player.x - 16, player.y + 7, 32, 25);

            // Ноги
            ctx.fillStyle = '#ffd5b5';
            ctx.fillRect(player.x - 12, player.y + 32, 10, 30);
            ctx.fillRect(player.x + 2, player.y + 32, 10, 30);

            // Кроссовки
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x - 14, player.y + 58, 14, 8);
            ctx.fillRect(player.x, player.y + 58, 14, 8);

            // Рука с ракеткой
            const angle = Math.atan2(mouseY - (player.y - 20), mouseX - (player.x + 40));

            ctx.save();
            ctx.translate(player.x + 18, player.y - 25);
            ctx.rotate(angle);

            // Рука
            ctx.fillStyle = '#ffd5b5';
            ctx.fillRect(0, -5, 40, 10);

            // Ракетка
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(35, -3, 25, 6);

            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.ellipse(70, 0, 25, 18, 0, 0, Math.PI * 2);
            ctx.fill();

            // Сетка ракетки
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            for (let i = -15; i <= 15; i += 6) {
                ctx.beginPath();
                ctx.moveTo(55, i);
                ctx.lineTo(85, i);
                ctx.stroke();
            }
            for (let i = 55; i <= 85; i += 6) {
                ctx.beginPath();
                ctx.moveTo(i, -15);
                ctx.lineTo(i, 15);
                ctx.stroke();
            }

            ctx.restore();
        }

        // Создать эффект попадания
        function createHitEffect(x, y, text) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = rect.width / baseWidth;
            const scaleY = rect.height / baseHeight;

            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.textContent = text;
            effect.style.left = (rect.left + x * scaleX) + 'px';
            effect.style.top = (rect.top + y * scaleY + window.scrollY) + 'px';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 800);
        }

        // Проверка попадания
        function checkHit(ball) {
            const k = kirill;
            if (ball.x > k.x && ball.x < k.x + k.width &&
                ball.y > k.y && ball.y < k.y + k.height) {

                // Определяем зону попадания
                let points = 10;
                let text = '💥 +10';

                // Голова - больше очков!
                if (ball.y < k.y + 70) {
                    points = 50;
                    text = '🎯 ГОЛОВА! +50';
                }

                score += points;
                hits++;
                scoreEl.textContent = score;
                hitsEl.textContent = hits;

                kirill.isHit = true;
                kirill.hitTimer = 30;

                createHitEffect(ball.x, ball.y, text);

                // Вибрация на мобильных
                if (navigator.vibrate) {
                    navigator.vibrate(points === 50 ? [100, 50, 100] : 50);
                }

                return true;
            }
            return false;
        }

        // Обновление мячей
        function updateBalls() {
            balls = balls.filter(ball => {
                ball.x += ball.vx;
                ball.y += ball.vy;
                ball.vy += 0.3; // Гравитация
                ball.rotation += ball.spin;

                // Проверка попадания
                if (checkHit(ball)) {
                    return false;
                }

                // Отскок от стены справа
                if (ball.x > 815) {
                    ball.x = 815;
                    ball.vx *= -0.7;
                }

                // Отскок от сетки
                if (ball.x > 418 && ball.x < 432 && ball.y > 248 && ball.y < 450) {
                    ball.x = ball.vx > 0 ? 418 : 432;
                    ball.vx *= -0.5;
                }

                // Отскок от пола корта
                if (ball.y > 510) {
                    ball.y = 510;
                    ball.vy *= -0.6;
                    ball.vx *= 0.85;
                }

                // Удаляем мячи за пределами
                return ball.x > -50 && ball.x < 950 && ball.y < 600;
            });
        }

        // Бросок мяча
        function throwBall() {
            const angle = Math.atan2(mouseY - (player.y - 20), mouseX - (player.x + 40));
            const speed = 8 + power * 18;

            balls.push({
                x: player.x + 60,
                y: player.y - 30,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: 12,
                rotation: 0,
                spin: (Math.random() - 0.5) * 0.3
            });
        }

        // Основной цикл
        function gameLoop() {
            ctx.clearRect(0, 0, baseWidth, baseHeight);

            drawBackground();
            drawKirill();
            drawPlayer();
            drawAim();

            balls.forEach(drawBall);
            updateBalls();

            // Зарядка силы
            if (isCharging) {
                power = Math.min(power + 0.02, 1);
                powerBar.style.width = (power * 100) + '%';
            }

            requestAnimationFrame(gameLoop);
        }

        // События мыши
        canvas.addEventListener('mousemove', (e) => {
            const coords = getCanvasCoords(e);
            mouseX = coords.x;
            mouseY = coords.y;
        });

        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            isCharging = true;
            power = 0;
        });

        canvas.addEventListener('mouseup', (e) => {
            e.preventDefault();
            if (isCharging) {
                throwBall();
                isCharging = false;
                power = 0;
                powerBar.style.width = '0%';
            }
        });

        canvas.addEventListener('mouseleave', () => {
            if (isCharging) {
                throwBall();
            }
            isCharging = false;
            power = 0;
            powerBar.style.width = '0%';
        });

        // События touch для мобильных
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const coords = getCanvasCoords(e);
            mouseX = coords.x;
            mouseY = coords.y;
            isCharging = true;
            power = 0;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const coords = getCanvasCoords(e);
            mouseX = coords.x;
            mouseY = coords.y;
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (isCharging) {
                throwBall();
                isCharging = false;
                power = 0;
                powerBar.style.width = '0%';
            }
        }, { passive: false });

        canvas.addEventListener('touchcancel', (e) => {
            isCharging = false;
            power = 0;
            powerBar.style.width = '0%';
        });

        // Запуск игры
        gameLoop();
    </script>
</body>
</html>
